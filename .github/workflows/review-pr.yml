# NOTE: This file is generated from examples/review-pr.yml.
# Do not edit this file directly. Instead, edit the example and run:
# npm run gen-workflows

name: Auto PR Review
on:
  workflow_call:
    inputs:
      profile:
        description: Optional Oz Agent profile name to use for Oz Agent.
        required: false
        type: string
        default: ''
      model:
        description: Optional Warp model ID to use for Oz Agent.
        required: false
        type: string
        default: ''
      name:
        description: Optional name for this agent task.
        required: false
        type: string
        default: ''
      mcp:
        description:
          Optional MCP configuration in JSON format (or a path to an mcp.json file) to start before
          executing the agent.
        required: false
        type: string
        default: ''
      skill:
        description: Optional Oz skill identifier to use as the base prompt for the agent.
        required: false
        type: string
        default: ''
    secrets:
      WARP_API_KEY:
        description: Oz API key used by the Oz Agent.
        required: true
jobs:
  review_pr:
    if:
      github.event.action != 'review_requested' || github.event.requested_reviewer.login ==
      'oz-agent'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout ${{ github.event.pull_request.number }}
          git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: Determine Review Scope
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;
            const baseSha = pr.base.sha;
            const { execSync } = require('child_process');

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            const markerPattern = /<!--\s*oz-agent-review:\s*(\{.*?\})\s*-->/s;
            const botLogins = new Set(['github-actions[bot]', 'oz-agent']);
            const newestFirst = reviews
              .filter((review) => review.state !== 'PENDING')
              .sort((a, b) => new Date(b.submitted_at || 0) - new Date(a.submitted_at || 0));

            let lastReviewedSha = '';

            for (const review of newestFirst) {
              const body = review.body || '';
              const marker = body.match(markerPattern);
              if (!marker) continue;

              try {
                const metadata = JSON.parse(marker[1]);
                if (metadata.head_sha && metadata.head_sha !== headSha) {
                  lastReviewedSha = metadata.head_sha;
                  break;
                }
              } catch (error) {
                core.warning(`Ignoring invalid Oz review marker on review ${review.id}: ${error.message}`);
              }
            }

            // Backward-compatible fallback for reviews posted before this workflow
            // started adding Oz markers.
            if (!lastReviewedSha) {
              const previousBotReview = newestFirst.find(
                (review) =>
                  review.commit_id &&
                  review.commit_id !== headSha &&
                  botLogins.has(review.user?.login)
              );
              if (previousBotReview) {
                lastReviewedSha = previousBotReview.commit_id;
              }
            }

            if (lastReviewedSha) {
              try {
                execSync(`git merge-base --is-ancestor ${lastReviewedSha} HEAD`);
              } catch (error) {
                core.warning(
                  `Previous Oz review commit ${lastReviewedSha} is not an ancestor of HEAD. Falling back to a full PR review.`
                );
                lastReviewedSha = '';
              }
            }

            const reviewMode = lastReviewedSha ? 'incremental' : 'full';
            core.setOutput('base_sha', lastReviewedSha || baseSha);
            core.setOutput('last_reviewed_sha', lastReviewedSha);
            core.setOutput('review_mode', reviewMode);
            core.notice(
              reviewMode === 'incremental'
                ? `Reviewing changes since previous Oz review at ${lastReviewedSha}.`
                : `No previous Oz review found. Reviewing full PR diff from ${baseSha}.`
            );
      - name: Build Annotated Diff
        run: |
          BASE_SHA="${{ steps.scope.outputs.base_sha }}"
          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "$BASE_SHA"
          fi

          # Diff only the changes introduced in this PR, relative to the PR's base commit
          # On follow-up reviews, BASE_SHA is the head commit from the last Oz review.
          # Add line numbers to each line: OLD_LINE NEW_LINE for context, OLD_LINE for deletions, NEW_LINE for additions
          git diff "$BASE_SHA"...HEAD | awk '
            /^diff --git/ { print; next }
            /^index / { print; next }
            /^---/ { print; next }
            /^\+\+\+/ { print; next }
            /^Binary files / { print; next }
            /^@@/ {
              # Parse hunk header: @@ -old_start,old_count +new_start,new_count @@
              split($2, old_parts, ",")
              split($3, new_parts, ",")
              old_line = -old_parts[1]
              new_line = substr(new_parts[1], 2)
              print
              next
            }
            /^-/ { printf "[OLD:%d]%s\n", old_line++, $0; next }
            /^\+/ { printf "[NEW:%d]%s\n", new_line++, $0; next }
            { printf "[OLD:%d,NEW:%d]%s\n", old_line++, new_line++, $0 }
          ' > pr_diff.txt
      - name: Construct Review Prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Fetch PR details
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            // Write PR description to a file. We don't include this or the diff in the prompt to stay within argument length limits.
            const diffPath = path.resolve('pr_diff.txt');
            const descriptionPath = path.resolve('pr_description.txt');
            fs.writeFileSync(descriptionPath, pr.body || 'No description provided.', 'utf8');

            // Fetch existing PR comments (both issue-level and inline review comments).
            const commentsPath = path.resolve('pr_comments.txt');
            const commentSections = [];

            // 1. PR-level (issue) comments.
            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber }
            );
            if (issueComments.length > 0) {
              commentSections.push('## PR-level comments\n');
              for (const c of issueComments) {
                commentSections.push(`### Comment by @${c.user.login} (${c.created_at})`);
                commentSections.push(c.body || '');
                commentSections.push('');
              }
            }

            // 2. Inline review comments.
            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number: prNumber }
            );
            if (reviewComments.length > 0) {
              commentSections.push('## Inline review comments\n');
              for (const c of reviewComments) {
                commentSections.push(`### Comment by @${c.user.login} on ${c.path}${c.line ? `:${c.line}` : ''} (${c.created_at})`);
                if (c.diff_hunk) {
                  commentSections.push('```diff');
                  commentSections.push(c.diff_hunk);
                  commentSections.push('```');
                }
                commentSections.push(c.body || '');
                commentSections.push('');
              }
            }

            if (commentSections.length > 0) {
              fs.writeFileSync(commentsPath, commentSections.join('\n'), 'utf8');
            } else {
              fs.writeFileSync(commentsPath, 'No existing comments on this PR.', 'utf8');
            }

            const prompt = `Review Pull Request #${prNumber}.

            PR title: ${pr.title}
            Review mode: ${{ steps.scope.outputs.review_mode }}
            Last reviewed commit: ${{ steps.scope.outputs.last_reviewed_sha || 'none' }}
            PR description: Read \`${descriptionPath}\`
            Annotated diff: Read \`${diffPath}\`
            Existing PR comments: Read \`${commentsPath}\`

            Use the review skill instructions as the base behavior. Apply them to this PR only.
            If review mode is incremental, review only the annotated diff since the last reviewed commit. Do not repeat a full PR overview or restate findings from existing PR comments. Leave summary empty unless there is a new cross-file concern that cannot be expressed inline.`;

            core.setOutput('prompt', prompt);
      - name: Run Oz Agent Review
        uses: warpdotdev/oz-agent-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          skill: ${{ inputs.skill || 'warpdotdev/oz-agent-action:review-pr' }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          profile: ${{ inputs.profile || vars.WARP_AGENT_PROFILE || '' }}
          model: ${{ inputs.model || vars.WARP_AGENT_MODEL || '' }}
          name: ${{ inputs.name || vars.WARP_AGENT_NAME || '' }}
          mcp: ${{ inputs.mcp || vars.WARP_AGENT_MCP || '' }}
      - name: Post Review
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewMode = '${{ steps.scope.outputs.review_mode }}';
            const reviewBaseSha = '${{ steps.scope.outputs.base_sha }}';
            const reviewHeadSha = context.payload.pull_request.head.sha;
            const reviewMarker = `<!-- oz-agent-review: ${JSON.stringify({
              head_sha: reviewHeadSha,
              base_sha: reviewBaseSha,
              mode: reviewMode,
            })} -->`;

            try {
              if (!fs.existsSync('review.json')) {
                console.log('No review.json found. Skipping review posting.');
                return;
              }

              const reviewContent = fs.readFileSync('review.json', 'utf8');

              let review;
              try {
                review = JSON.parse(reviewContent);
              } catch (parseError) {
                core.warning(
                  `Failed to parse review.json (likely due to unescaped control characters). Attempting to sanitize. Original error: ${parseError.message}`
                );
                const sanitized = reviewContent.replace(/[\\u0000-\\u001F]+/g, ' ');
                try {
                  review = JSON.parse(sanitized);
                } catch (sanitizedError) {
                  core.setFailed(
                    `Failed to parse review.json even after sanitizing control characters: ${sanitizedError.message}`
                  );
                  return;
                }
              }

              const decodeNewlines = (text) => {
                if (typeof text !== 'string') return text;
                // Convert escaped "\n" sequences into real newlines so comments render correctly.
                return text
                  .replace(/\r\n/g, '\n')
                  .replace(/\\n/g, '\n');
              };

              // Ensure we have an array of comments
              const rawComments = Array.isArray(review.comments) ? review.comments : [];

              // Fetch valid file paths from the PR to avoid "path is invalid" errors
              const prFiles = await github.paginate(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number: prNumber }
              );
              const validPaths = new Set(prFiles.map(f => f.filename));

              // Binary files lack a patch property in the listFiles response.
              const patchlessPaths = new Set(
                prFiles.filter(f => !f.patch).map(f => f.filename)
              );

              const comments = [];
              const fileComments = [];

              for (const c of rawComments) {
                if (!c || typeof c !== 'object') continue;
                if (typeof c.body !== 'string' || !c.body.trim()) continue;
                if (typeof c.path !== 'string' || !c.path.trim()) continue;

                // Normalize path: strip leading a/ or b/ and ./
                const normalizedPath = c.path.trim()
                  .replace(/^([ab]\/)*/, '')
                  .replace(/^\.\//, '');

                if (!validPaths.has(normalizedPath)) {
                  console.log(`Skipping comment with invalid path: ${c.path} -> ${normalizedPath}`);
                  continue;
                }

                const isBinary = patchlessPaths.has(normalizedPath);

                if (isBinary) {
                  // Binary files cannot have line-level comments; ignore any line info.
                  if (c.line !== undefined && c.line !== null) {
                    console.log(`Ignoring line number on binary file comment: ${normalizedPath}`);
                  }
                  if (c.start_line !== undefined && c.start_line !== null) {
                    console.log(`Ignoring start_line on binary file comment: ${normalizedPath}`);
                  }

                  fileComments.push({
                    path: normalizedPath,
                    body: decodeNewlines(c.body),
                  });
                  continue;
                }

                // Text file: line is required.
                const line = Number(c.line);
                if (!Number.isInteger(line) || line <= 0) {
                  console.log('Skipping comment with invalid line:', c);
                  continue;
                }

                let side = (c.side || 'RIGHT').toString().toUpperCase();
                if (side !== 'LEFT' && side !== 'RIGHT') {
                  console.log(`Invalid side '${c.side}', defaulting to RIGHT`);
                  side = 'RIGHT';
                }

                // Optional multi-line range support via start_line.
                let startLine;
                if (c.start_line !== undefined && c.start_line !== null) {
                  startLine = Number(c.start_line);
                  if (!Number.isInteger(startLine) || startLine <= 0 || startLine === line) {
                    console.log('Ignoring invalid start_line on comment:', c);
                    startLine = undefined;
                  } else if (startLine > line) {
                    console.log('Ignoring start_line greater than line on comment:', c);
                    startLine = undefined;
                  }
                }

                const commentPayload = {
                  path: normalizedPath,
                  line,
                  side,
                  body: decodeNewlines(c.body),
                };

                if (startLine && startLine < line) {
                  commentPayload.start_line = startLine;
                  // Use the same side for the start of the range by default.
                  commentPayload.start_side = side;
                }

                comments.push(commentPayload);
              }

              let summary =
                typeof review.summary === 'string' ? decodeNewlines(review.summary).trim() : '';
              if (reviewMode === 'incremental') {
                summary = '';
              }

              const hasSummary = summary.length > 0;

              if (!hasSummary && comments.length === 0 && fileComments.length === 0) {
                await github.rest.pulls.createReview({
                  owner,
                  repo,
                  pull_number: prNumber,
                  event: 'COMMENT',
                  body: reviewMarker,
                });
                console.log('No valid summary or inline comments found. Posted hidden Oz review marker.');
                return;
              }

              // Post the main review with text-file inline comments.
              if (hasSummary || comments.length > 0 || fileComments.length > 0) {
                const payload = {
                  owner,
                  repo,
                  pull_number: prNumber,
                  event: 'COMMENT',
                };

                if (hasSummary) {
                  payload.body = `${summary}\n\n${reviewMarker}`;
                } else if (reviewMode === 'incremental') {
                  payload.body = reviewMarker;
                } else {
                  payload.body = `Automated review by Oz Agent\n\n${reviewMarker}`;
                }

                if (comments.length > 0) {
                  payload.comments = comments;
                }

                await github.rest.pulls.createReview(payload);
                console.log('Review posted successfully.');
              }

              // Post binary-file comments separately as file-level review comments.
              const commitId = context.payload.pull_request.head.sha;
              for (const bc of fileComments) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner,
                    repo,
                    pull_number: prNumber,
                    commit_id: commitId,
                    path: bc.path,
                    body: bc.body,
                    subject_type: 'file',
                  });
                  console.log(`Posted binary file comment on ${bc.path}`);
                } catch (commentError) {
                  console.error(`Failed to post binary file comment on ${bc.path}:`, commentError.message);
                }
              }

            } catch (error) {
              if (error.response?.data?.errors) {
                console.error('GitHub API error details:', JSON.stringify(error.response.data.errors, null, 2));
              }
              if (error.response?.data) {
                console.error('GitHub API response data:', JSON.stringify(error.response.data, null, 2));
              }
              console.error('Failed to post review:', error);
              core.setFailed(`Failed to post review: ${error.message}`);
            }
